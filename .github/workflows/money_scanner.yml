name: Final Run

on:
  schedule:
    - cron: '45 14 * * 1-5'
  workflow_dispatch:

jobs:
  run-scan:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      MAIL_USER: ${{ secrets.MAIL_USER }}
      MAIL_PASS: ${{ secrets.MAIL_PASS }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 👇 这一行是关键！修复了所有的报错！
      - name: Install Libraries
        run: pip install "numpy<2" yfinance pandas pandas_ta tabulate requests

      - name: Run Script
        run: python run.py
